<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: white;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 320px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #212529;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #86b7fe;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.25);
        }

        .form-control::placeholder {
            color: #6c757d;
            opacity: 1;
        }

        .btn-primary {
            width: 100%;
            padding: 8px 12px;
            font-size: 16px;
            font-weight: 400;
            color: white;
            background-color: #0d6efd;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
        }

        .alert {
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
        }

        .alert-danger {
            background-color: #f8d7da;
            border: 1px solid #f5c2c7;
            color: #842029;
        }

        .alert-success {
            background-color: #d1e7dd;
            border: 1px solid #badbcc;
            color: #0f5132;
        }

        .d-none {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>Please sign in</h1>

    <!-- ✅ Сообщения (показываются через JavaScript по параметрам URL) -->
    <div id="errorAlert" class="alert alert-danger d-none">
        Неверное имя пользователя или пароль
    </div>

    <div id="logoutAlert" class="alert alert-success d-none">
        Вы успешно вышли из системы
    </div>

    <div id="registeredAlert" class="alert alert-success d-none">
        Регистрация успешна! Теперь вы можете войти.
    </div>

    <!-- ✅ Стандартная форма для Spring Security -->
    <form action="/login" method="post">
        <div class="form-group">
            <input type="email"
                   class="form-control"
                   name="email"
                   placeholder="Email address"
                   required
                   autofocus>
        </div>

        <div class="form-group">
            <input type="password"
                   class="form-control"
                   name="password"
                   placeholder="Password"
                   required>
        </div>

        <button type="submit" class="btn-primary">Sign in</button>
    </form>
</div>

<!-- ✅ JavaScript для показа сообщений -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);

        // Показываем сообщения в зависимости от параметров URL
        if (params.has('error')) {
            document.getElementById('errorAlert').classList.remove('d-none');
        }
        if (params.has('logout')) {
            document.getElementById('logoutAlert').classList.remove('d-none');
        }
        if (params.has('registered')) {
            document.getElementById('registeredAlert').classList.remove('d-none');
        }
    });
</script>

</body>
</html>
