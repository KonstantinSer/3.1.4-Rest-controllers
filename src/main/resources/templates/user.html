<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User page</title>
  <!-- Подключаем локальный Bootstrap, как вы делали ранее -->
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background-color: #343a40; }
    .sidebar { background-color: white; min-height: 100vh; padding-top: 15px; }
    .main-content { padding: 20px 30px; }
    /* Стили для таблицы как на скриншоте */
    .table-container { border: 1px solid #dee2e6; border-radius: 0.25rem; background-color: white; }
    .table-header { background-color: #f1f1f1; padding: 10px 20px; border-bottom: 1px solid #dee2e6; }
  </style>
</head>
<body>

<!-- ВЕРХНЯЯ ПАНЕЛЬ -->
<nav class="navbar navbar-dark px-4 py-2">
    <span class="navbar-text text-white">
        <strong th:text="${user.email}">user@mail.ru</strong>
        <span class="fw-light">with roles: </span>
        <span class="fw-light" th:each="role : ${user.roles}" th:text="${role.name.replace('ROLE_', '')} + ' '"></span>
    </span>
  <form th:action="@{/logout}" method="POST">
    <button type="submit" class="btn btn-link text-secondary text-decoration-none p-0">Logout</button>
  </form>
</nav>

<div class="container-fluid">
  <div class="row">
    <!-- ЛЕВЫЙ САЙДБАР -->
    <nav class="col-md-2 d-none d-md-block sidebar px-0">
      <div class="nav flex-column nav-pills">


        <a class="nav-link"
           th:href="@{/admin}"
           th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/admin')} ? 'active'">
          Admin
        </a>

        <!-- Ссылка на User -->
        <a class="nav-link"
           th:href="@{/user}"
           th:classappend="${#strings.contains(#httpServletRequest.requestURI, '/user')} ? 'active'">
          User
        </a>

      </div>
    </nav>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="col-md-10 main-content">
      <h1 class="mb-3">User information-page</h1>

      <div class="table-container">
        <div class="table-header">
          <h5 class="m-0">About user</h5>
        </div>
        <div class="p-4">
          <table class="table table-striped align-middle border-top">
            <thead>
            <tr>
              <th>ID</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Age</th>
              <th>Email</th>
              <th>Role</th>
            </tr>
            </thead>
            <tbody>
            <tr>
              <td th:text="${user.id}">3</td>
              <td th:text="${user.firstName}">user</td>
              <td th:text="${user.lastName}">user</td>
              <td th:text="${user.age}">30</td>
              <td th:text="${user.email}">user@mail.ru</td>
              <td>
                <span th:each="role : ${user.roles}" th:text="${role.name.replace('ROLE_', '')} + ' '"></span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
