<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .top-panel { background-color: #343a40; color: white; padding: 10px 20px; }
        .sidebar { background-color: white; min-height: calc(100vh - 48px); padding-top: 20px; }
        .nav-pills .nav-link.active { background-color: #007bff; border-radius: 4px; }
        .card-header { background-color: #f7f7f7; font-weight: bold; border-bottom: 1px solid #dee2e6; }
        .form-container { max-width: 300px; margin: 0 auto; text-align: center; }
        label { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<!-- Шапка -->
<div class="top-panel d-flex justify-content-between align-items-center">
    <div>
        <strong th:text="${currentUser.email}">admin@mail.ru</strong>
        <span> with roles: </span>
        <span th:each="role : ${currentUser.roles}" th:text="${role.name.replace('ROLE_', '')} + ' '"></span>
    </div>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-link text-secondary text-decoration-none p-0">Logout</button>
    </form>
</div>

<div class="container-fluid">
    <div class="row">
        <!-- Левое меню -->
        <div class="col-md-2 px-0 sidebar shadow-sm">
            <div class="nav flex-column nav-pills">
                <a class="nav-link active mx-2" href="/admin">Admin</a>
                <a class="nav-link mx-2" href="/user">User</a>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="col-md-10 p-4">
            <h1>Admin panel</h1>

            <!-- ВКЛАДКИ -->
            <ul class="nav nav-tabs" id="adminTab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="table-tab" data-bs-toggle="tab" data-bs-target="#table-content" type="button" role="tab">Users table</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" data-bs-target="#form-content" type="button" role="tab">New User</button>
                </li>
            </ul>

            <div class="tab-content border bg-white" id="adminTabContent">

                <!-- ВКЛАДКА 1: ТАБЛИЦА -->
                <div class="tab-pane fade show active" id="table-content" role="tabpanel">
                    <div class="card border-0">
                        <div class="card-header">All users</div>
                        <div class="card-body">
                            <table class="table table-striped align-middle">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Age</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="u : ${users}">
                                    <td th:text="${u.id}"></td>
                                    <td th:text="${u.firstName}"></td>
                                    <td th:text="${u.lastName}"></td>
                                    <td th:text="${u.age}"></td>
                                    <td th:text="${u.email}"></td>
                                    <td><span th:each="r : ${u.roles}" th:text="${r.name.replace('ROLE_', '')} + ' '"></span></td>
                                    <td><button class="btn btn-info btn-sm text-white">Edit</button></td>
                                    <td>
                                        <form th:action="@{/admin/deleteUser}" method="post">
                                            <input type="hidden" name="id" th:value="${u.id}">
                                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ВКЛАДКА 2: НОВЫЙ ПОЛЬЗОВАТЕЛЬ -->
                <div class="tab-pane fade" id="form-content" role="tabpanel">
                    <div class="card border-0">
                        <div class="card-header">Add new user</div>
                        <div class="card-body">
                            <div class="form-container">
                                <form th:action="@{/admin/addNewUser}" th:object="${newUser}" method="post">
                                    <label>First name</label>
                                    <input type="text" th:field="*{firstName}" class="form-control form-control-sm" required>

                                    <label>Last name</label>
                                    <input type="text" th:field="*{lastName}" class="form-control form-control-sm" required>

                                    <label>Age</label>
                                    <input type="number" th:field="*{age}" class="form-control form-control-sm" required>

                                    <label>Email</label>
                                    <input type="email" th:field="*{email}" class="form-control form-control-sm" required>

                                    <label>Password</label>
                                    <input type="password" th:field="*{password}" class="form-control form-control-sm" required>

                                    <label>Role</label>
                                    <select class="form-select" name="roleIds" multiple required style="height: 60px;">
                                        <option th:each="role : ${allRoles}"
                                                th:value="${role.id}"
                                                th:text="${role.name.replace('ROLE_', '')}"></option>
                                    </select>

                                    <button type="submit" class="btn btn-success btn-lg mt-3">Add new user</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </div> <!-- Конец tab-content -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net"></script>
</body>
</html>
